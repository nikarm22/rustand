name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz || true
      - name: Run fuzzing (smoke test)
        run: |
          cargo +nightly fuzz run single_threaded --features single-threaded -- -runs=1000
          cargo +nightly fuzz run multi_threaded --features multi-threaded -- -runs=1000
          cargo +nightly fuzz run tokio --features tokio -- -runs=1000
          cargo +nightly fuzz run async_std --features async-std -- -runs=1000

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [single-threaded, multi-threaded, tokio, async-std]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.runtime }}
      - name: Run clippy
        run: cargo clippy --features ${{ matrix.runtime }} --no-default-features --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [single-threaded, multi-threaded, tokio, async-std]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.runtime }}
      - name: Run tests
        run: cargo test --features ${{ matrix.runtime }} --no-default-features

  publish:
    name: Publish
    needs: [fuzz, fmt, clippy, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish Placeholder
        run: |
          echo "Release detected. This is where 'cargo publish' would run."
          # cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
